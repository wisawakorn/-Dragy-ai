services:
  - type: web
    name: darky-hatthevas-backend
    env: python
    region: singapore
    plan: free
    
    # Build settings
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: OLLAMA_BASE_URL
        value: http://127.0.0.1:11434/api/generate
    
    # Health check
    healthCheckPath: /
    
    # Auto-deploy from GitHub
    repo: https://github.com/wisawakorn/-Dragy-ai
    branch: main
    
    # Deployment hooks
    preDeployCommand: |
      echo "🚀 Deploying Darky Hatthevas Studio..."
